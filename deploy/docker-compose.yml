version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: tt-assistant-api:latest
    restart: unless-stopped
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
